{% extends "layout.html" %}
{% block content %}

<h2>Donation Records</h2>

<table class="table table-dark table-striped">
<tr>
<th>ID</th><th>Date</th><th>Units</th><th>Name</th>
<th>Age</th><th>Blood</th><th>Contact</th><th>Address</th>
</tr>

{% for r in rows %}
<tr>
<td>{{ r[0] }}</td>
<td>{{ r[1] }}</td>
<td>{{ r[2] }}</td>
<td>{{ r[3] }}</td>
<td>{{ r[4] }}</td>
<td>{{ r[5] }}</td>
<td>{{ r[6] }}</td>
<td>{{ r[7] }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
